<!DOCTYPE html>
<html>
<head>
    <title>Virtuals Mini App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Farcaster Mini App (vNext) -->
    <meta name="fc:frame" content='{
        "version": "next",
        "imageUrl": "https://i.imgur.com/ZSmUl7E.jpeg",
        "button": {
            "title": "🚀 Buka Virtuals",
            "action": {
                "type": "launch_frame",
                "name": "Virtuals Mini App",
                "url": "https://app.virtuals.io/",
                "splashImageUrl": "https://i.imgur.com/ZSmUl7E.jpeg",
                "splashBackgroundColor": "#0a0a0a"
            }
        }
    }'>

    <!-- Open Graph (tetap dibutuhkan) -->
    <meta property="og:title" content="Virtuals Mini App">
    <meta property="og:description" content="AI Agents langsung di Farcaster">
    <meta property="og:image" content="https://i.imgur.com/ZSmUl7E.jpeg">
    <meta property="og:url" content="https://virtuals-frame.vercel.app/">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 420px;
            padding: 2rem;
        }
        img.logo {
            width: 180px;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 600;
            background: linear-gradient(90deg, #00ff9d, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.25rem;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.imgur.com/ZSmUl7E.jpeg" alt="Virtuals Logo" class="logo">
        <h1>Virtuals Mini App</h1>
        <p>AI Agents langsung di Farcaster</p>
    </div>
</body>
</html>
