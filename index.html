<!DOCTYPE html>
<html>
<head>
    <title>Virtuals Mini App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Open Graph -->
    <meta property="og:title" content="Virtuals AI Platform">
    <meta property="og:description" content="Explore AI Agents di Virtuals.io">
    <meta property="og:image" content="https://i.imgur.com/ZSmUl7E.jpeg">
    <meta property="og:url" content="https://virtuals-frame.vercel.app/">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">

    <!-- Farcaster Frame -->
    <meta property="fc:frame" content="vNext">
    <meta property="fc:frame:image" content="https://i.imgur.com/ZSmUl7E.jpeg">
    <meta property="fc:frame:button:1" content="🚀 Open Virtuals">
    <meta property="fc:frame:button:1:action" content="link">
    <meta property="fc:frame:button:1:target" content="https://app.virtuals.io/">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
            background: linear-gradient(90deg, #00ff9d, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.3rem;
            opacity: 0.9;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Virtuals Mini App</h1>
        <p>🚀 Explore AI Agents di Virtuals.io</p>
    </div>
</body>
</html>
